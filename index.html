<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Memory Capsule</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="landing-page">

  <!-- Video Background -->
  <div class="video-bg-wrapper">
    <video src="video.mp4" autoplay muted loop playsinline class="bg-video"></video>
    <div class="video-fallback"></div>
    <div class="video-overlay"></div>
  </div>

  <!-- Floating sparkles -->
  <div class="sparkles">
    <span class="sparkle s1">✦</span>
    <span class="sparkle s2">✧</span>
    <span class="sparkle s3">⋆</span>
    <span class="sparkle s4">✦</span>
    <span class="sparkle s5">✧</span>
    <span class="sparkle s6">⋆</span>
    <span class="sparkle s7">✦</span>
    <span class="sparkle s8">✧</span>
  </div>

  <!-- Center Content -->
  <div class="landing-center">
    <div class="landing-title-wrap">
      <p class="landing-subtitle-top">✨ a place to remember what you read ✨</p>
      <h1 class="landing-title">Book Memory<br/>Capsule</h1>
    </div>

    <!-- Capsule Button -->
    <div class="capsule-btn-wrap" onclick="window.location.href='content.html'">
      <div class="capsule-glow-ring"></div>
      <div class="capsule-outer">
        <div class="capsule-glass">
          <div class="capsule-shine"></div>
          <div class="capsule-inner-paper">
            <div class="capsule-scroll-icon">📖</div>
          </div>
          <div class="capsule-bubble b1"></div>
          <div class="capsule-bubble b2"></div>
          <div class="capsule-bubble b3"></div>
        </div>
      </div>
      <div class="capsule-btn-label">
        <span>Enter Your Book Memory Garden</span>
        <span class="capsule-btn-arrow">→</span>
      </div>
    </div>

    <p class="landing-tagline">Save what a book meant to you, before the feeling fades.</p>
  </div>

</body>
</html>
